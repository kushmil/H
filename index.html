<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>anshu.fighter - Game UI</title>

    <!-- Google Fonts for Game Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Montserrat:ital,wght@0,700;0,900;1,800;1,900&display=swap" rel="stylesheet">
    
    <!-- Libraries CSS -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/css/iziToast.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --cyan: #00e5ff; --magenta: #ff007f; --yellow: #ffd700;
            --dark-purple: #2c2541; --light-purple: #5c4d7d; --bg-gray: #e6e9f0;
            --text-stroke: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff, 2px 2px 0px rgba(0,0,0,0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            width: 100vw; height: 100vh; overflow: hidden; font-family: 'Montserrat', sans-serif;
            background-image: linear-gradient(120deg, var(--cyan) 0%, var(--cyan) 15%, #ffffff 15%, #ffffff 30%, var(--magenta) 30%, var(--magenta) 50%, var(--bg-gray) 50%, var(--bg-gray) 100%);
        }

        /* --- PORTRAIT WARNING --- */
        #portrait-warning { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-purple); color: white; z-index: 100000; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        @media screen and (orientation: portrait) { #portrait-warning { display: flex; } }

        /* --- SPLASH SCREEN --- */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1a1625, #2c2541); z-index: 50000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease-out; }
        .splash-title { font-family: 'Lilita One', cursive; font-size: 80px; color: var(--yellow); text-shadow: 0px 4px 0px #b8860b, 0px 8px 15px rgba(0,0,0,0.5); margin-bottom: 40px; letter-spacing: 2px; animation: float 2s ease-in-out infinite; }
        .splash-title span { color: var(--cyan); }
        .start-btn { font-family: 'Lilita One', cursive; font-size: 32px; color: var(--dark-purple); background: var(--yellow); padding: 15px 50px; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0px 6px 0px #b8860b, 0px 10px 20px rgba(0,0,0,0.4); transition: all 0.1s; }
        .start-btn:active { transform: translateY(6px); box-shadow: 0px 0px 0px #b8860b, 0px 4px 10px rgba(0,0,0,0.4); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* --- GAME CONTAINER & CANVAS GREEN SCREEN --- */
        #game-wrapper { opacity: 0; pointer-events: none; transition: opacity 0.5s; width: 100%; height: 100%; position: absolute;}
        
        #character-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; 
            display: flex; justify-content: center; align-items: flex-end; pointer-events: none; 
        }
        
        /* Hidden original video */
        #video-source { display: none; }

        /* Canvas where we draw the transparent character */
        #character-canvas { 
            height: 90%; max-height: 800px; object-fit: contain; 
            pointer-events: auto; cursor: pointer; margin-left: 10%; 
            transition: filter 0.3s;
        }

        /* Ouch Bubble */
        .ouch-bubble { position: absolute; z-index: 200; background: white; color: black; font-family: 'Lilita One', cursive; font-size: 28px; padding: 5px 15px; border-radius: 20px; border: 3px solid black; pointer-events: none; transform: translate(-50%, -100%); animation: popOut 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; box-shadow: 2px 2px 0px rgba(0,0,0,0.3); }
        .ouch-bubble::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); border-width: 10px 10px 0; border-style: solid; border-color: black transparent transparent transparent; }
        .ouch-bubble::before { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); border-width: 8px 8px 0; border-style: solid; border-color: white transparent transparent transparent; z-index: 1; }
        @keyframes popOut { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 40% { transform: translate(-50%, -120%) scale(1.2); opacity: 1; } 100% { transform: translate(-50%, -150%) scale(1); opacity: 0; } }

        /* --- MAIN UI LAYER --- */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; padding: 20px; pointer-events: none; transition: filter 0.3s, opacity 0.3s;}
        .interactive { pointer-events: auto; cursor: pointer; }

        .top-left { position: absolute; top: 20px; left: 20px; display: flex; gap: 15px; }
        .profile-bar { background: var(--dark-purple); color: white; padding: 5px 20px 5px 50px; border-radius: 5px; clip-path: polygon(0 0, 100% 0, 92% 100%, 0% 100%); position: relative; display: flex; align-items: center; width: 250px; box-shadow: 3px 3px 10px rgba(0,0,0,0.3); transition: transform 0.1s;}
        .profile-bar:active { transform: scale(0.97); }
        .avatar { position: absolute; left: -10px; top: -5px; width: 50px; height: 50px; background: #fff; border: 3px solid var(--dark-purple); border-radius: 8px; overflow: hidden; }
        .prof-info { flex-grow: 1; }
        .prof-name { font-family: 'Lilita One', cursive; font-size: 18px; letter-spacing: 1px; }
        .prof-stats { font-size: 12px; color: var(--yellow); font-weight: bold; }
        .exp-bar { width: 100%; height: 6px; background: #444; margin-top: 4px; border-radius: 3px; }
        .exp-fill { width: 40%; height: 100%; background: var(--yellow); border-radius: 3px; box-shadow: 0 0 5px var(--yellow);}
        
        .top-right { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; align-items: center; }
        .currency-box { background: var(--light-purple); color: white; padding: 5px 15px 5px 35px; clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%); font-family: 'Lilita One', cursive; font-size: 18px; position: relative; letter-spacing: 1px; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); }
        .currency-icon { position: absolute; left: 5px; top: 50%; transform: translateY(-50%); width: 25px; height: 25px; }
        .menu-btn { background: none; border: none; color: white; font-size: 24px; filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.5)); transition: transform 0.1s;}
        .menu-btn:active { transform: scale(0.9); }
        
        .left-menu { position: absolute; top: 85px; left: 20px; display: flex; flex-direction: column; gap: 5px; z-index: 15; }
        .top-up-banner { background: var(--yellow); color: var(--dark-purple); padding: 8px 20px; font-family: 'Lilita One', cursive; font-size: 20px; line-height: 1; clip-path: polygon(0 0, 100% 0, 90% 100%, 0% 100%); margin-bottom: 10px; box-shadow: 3px 3px 0px rgba(0,0,0,0.2); }
        .menu-item { font-family: 'Lilita One', cursive; font-size: 34px; color: var(--dark-purple); text-transform: uppercase; letter-spacing: 1px; text-shadow: var(--text-stroke); transition: transform 0.1s; cursor: pointer; }
        .menu-item:active { transform: scale(0.95); }

        .right-panel { position: absolute; bottom: 20px; right: 20px; width: 300px; display: flex; flex-direction: column; gap: 5px; z-index: 15; }
        .clash-box { background: linear-gradient(90deg, #6c4f70, #4a3b52); padding: 15px; border-radius: 5px; color: white; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.3); border: 2px solid #84688a; }
        .clash-title { font-family: 'Lilita One', cursive; font-size: 30px; letter-spacing: 1px; text-shadow: 2px 2px 0px rgba(0,0,0,0.5); }
        .clash-sub { color: var(--cyan); font-size: 14px; font-weight: 800; font-style: italic; }
        .energy-bar { background: var(--dark-purple); color: white; font-size: 12px; font-weight: bold; padding: 5px 10px; display: flex; justify-content: space-between; align-items: center; clip-path: polygon(0 0, 100% 0, 98% 100%, 2% 100%); }
        .play-btn { background: var(--yellow); color: var(--dark-purple); font-family: 'Lilita One', cursive; font-size: 42px; letter-spacing: 2px; border: none; padding: 10px; width: 100%; clip-path: polygon(5px 0, 100% 0, calc(100% - 5px) 100%, 0 100%); box-shadow: inset -3px -5px 0px rgba(0,0,0,0.15), 0px 5px 10px rgba(0,0,0,0.3); transition: filter 0.2s, transform 0.1s; text-shadow: 1px 1px 0px rgba(255,255,255,0.5); }
        .play-btn:active { transform: scale(0.97); box-shadow: none; }

        .bottom-left { position: absolute; bottom: 20px; left: 20px; display: flex; align-items: flex-end; z-index: 20; }
        .season-badge { width: 80px; height: 80px; background: var(--dark-purple); border: 3px solid white; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-family: 'Lilita One', cursive; font-size: 28px; z-index: 2; box-shadow: 2px 2px 10px rgba(0,0,0,0.4); }
        .season-bar { background: var(--dark-purple); color: white; padding: 5px 15px 5px 30px; margin-left: -20px; margin-bottom: 10px; clip-path: polygon(0 0, 100% 0, 95% 100%, 0 100%); font-family: 'Lilita One', cursive; display: flex; align-items: center; gap: 10px; }
        .char-stats { position: absolute; bottom: 120px; left: 35%; display: flex; flex-direction: column; align-items: flex-start; z-index: 5;}
        .lvl-tag { color: white; font-family: 'Lilita One', cursive; font-size: 36px; text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }
        .glory-tag { background: #8b5cf6; color: white; padding: 2px 12px; font-size: 14px; font-weight: 900; font-style: italic; clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%); margin-top: 5px; box-shadow: 2px 2px 0px rgba(0,0,0,0.5); }

        .dev-link { position: absolute; z-index: 1000; color: white; text-decoration: none; font-family: 'Montserrat', sans-serif; font-weight: bold; font-style: italic; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); padding: 5px 15px; border-radius: 20px; font-size: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.2s; }

        /* --- DETAILED SPA MODAL (WINDOWS) --- */
        #modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 200; display: none; justify-content: center; align-items: center; background: rgba(26, 22, 37, 0.8); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); opacity: 0; transition: opacity 0.3s; }
        .modal-window { width: 80%; height: 85%; background: var(--dark-purple); border: 4px solid var(--yellow); border-radius: 15px; display: flex; flex-direction: column; box-shadow: 0px 10px 30px rgba(0,0,0,0.8); transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal-overlay.active .modal-window { transform: scale(1); }
        .modal-header { background: var(--light-purple); padding: 10px 20px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--yellow); }
        .modal-header h2 { font-family: 'Lilita One', cursive; color: var(--yellow); font-size: 32px; letter-spacing: 2px; text-shadow: 2px 2px 0 #000; }
        .close-btn { background: var(--magenta); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; cursor: pointer; box-shadow: 0 4px 0 #9e004f; transition: transform 0.1s; }
        .close-btn:active { transform: translateY(4px); box-shadow: none; }
        .modal-content { flex: 1; overflow-y: auto; padding: 20px; color: white; }

        /* Generic Grids for Modal Content */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .item-card { background: #3f3557; border: 2px solid #5c4d7d; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; transition: transform 0.2s, border-color 0.2s; }
        .item-card:hover { transform: translateY(-5px); border-color: var(--cyan); }
        .item-img { width: 100%; height: 100px; background: #2c2541; border-radius: 5px; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; font-size: 40px; color: #fff; }
        .item-title { font-family: 'Lilita One', cursive; font-size: 18px; color: var(--cyan); }
        .item-sub { font-size: 12px; color: #aaa; font-weight: bold; margin-top: 5px; }

        /* Profile Layout */
        .prof-layout { display: flex; gap: 30px; align-items: center; }
        .prof-big-avatar { width: 150px; height: 150px; background: var(--yellow); border-radius: 20px; border: 5px solid white; display:flex; justify-content:center; align-items:center; font-size: 60px; color: var(--dark-purple); }
        .prof-details h1 { font-family: 'Lilita One', cursive; font-size: 40px; color: white; }
        .prof-details p { color: var(--cyan); font-weight: bold; margin-bottom: 15px;}
        .stat-box { display: inline-block; background: #3f3557; padding: 10px 20px; border-radius: 10px; text-align: center; margin-right: 10px; }
        .stat-box span { display: block; font-family: 'Lilita One', cursive; font-size: 24px; color: var(--yellow); }

        /* Event Layout */
        .event-row { display: flex; justify-content: space-between; align-items: center; background: #3f3557; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--magenta); }
        .event-info h3 { font-family: 'Lilita One', cursive; color: white; font-size: 22px; }
        .event-info p { font-size: 12px; color: #aaa; margin-top: 5px; }
        .claim-btn { background: var(--cyan); color: var(--dark-purple); font-family: 'Lilita One', cursive; border: none; padding: 10px 20px; border-radius: 20px; font-size: 18px; cursor: pointer; box-shadow: 0 4px 0 #00a1b3; }
        .claim-btn:active { transform: translateY(4px); box-shadow: none; }

    </style>
</head>
<body>

    <!-- MULTI-PURPOSE MODAL OVERLAY (SPA Pages) -->

                <h2 id="modal-title">TITLE</h2>
                <button class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="modal-content" class="modal-content">

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/js/iziToast.min.js"></script>

    <script>
        // --- INITIALIZATION ---
        iziToast.settings({ timeout: 2000, position: 'bottomRight', theme: 'dark' });

        async function startGame() {
            const elem = document.documentElement;
            try { if (elem.requestFullscreen) await elem.requestFullscreen(); else if (elem.webkitRequestFullscreen) await elem.webkitRequestFullscreen(); } catch (e) {}
            try { if (screen.orientation && screen.orientation.lock) await screen.orientation.lock("landscape").catch(e=>{}); } catch (e) {}

            document.getElementById('splash-screen').style.opacity = '0';
            
            // Start the Video & Chroma Key process
            initGreenScreen();

            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('game-wrapper').style.opacity = '1';
                document.getElementById('game-wrapper').style.pointerEvents = 'auto';
                iziToast.success({ title: 'Welcome Back!', message: 'anshu.fighter', icon: 'fa-solid fa-gamepad' });
            }, 500);
        }

        // --- LIVE CHROMA KEY (GREEN SCREEN) REMOVER ---
        function initGreenScreen() {
            const video = document.getElementById('video-source');
            const canvas = document.getElementById('character-canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            
            // Play video explicitly
            video.play().catch(e => console.log("Video play error:", e));

            video.addEventListener('play', function() {
                // Set canvas size matching the video resolution for crispness
                canvas.width = video.videoWidth || 600; 
                canvas.height = video.videoHeight || 800;

                function processFrame() {
                    if (video.paused || video.ended) return;
                    
                    // Draw current video frame to canvas
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // Get Pixel Data
                    let frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    let length = frame.data.length;

                    // The specific Green from your image is roughly RGB (143, 176, 148)
                    const targetR = 143;
                    const targetG = 176;
                    const targetB = 148;
                    const tolerance = 60; // Adjust this if edge is too sharp/soft

                    for (let i = 0; i < length; i += 4) {
                        let r = frame.data[i];
                        let g = frame.data[i + 1];
                        let b = frame.data[i + 2];

                        // Calculate color distance
                        let distance = Math.sqrt(
                            (r - targetR) * (r - targetR) +
                            (g - targetG) * (g - targetG) +
                            (b - targetB) * (b - targetB)
                        );

                        // If pixel is within the green threshold, make it transparent
                        if (distance < tolerance) {
                            frame.data[i + 3] = 0; // Alpha = 0
                        } else if (distance < tolerance + 15) {
                            // Smooth edges (anti-aliasing)
                            frame.data[i + 3] = (distance - tolerance) * (255 / 15);
                        }
                    }
                    
                    // Put processed pixels back on canvas
                    ctx.putImageData(frame, 0, 0);
                    
                    // Loop
                    requestAnimationFrame(processFrame);
                }
                processFrame();
            });
        }

        // --- CHARACTER CLICK ANIMATION ---
        function showOuchBubble(event) {
            const bubble = document.createElement('div');
            bubble.classList.add('ouch-bubble');
            bubble.innerText = 'Ouch!';
            bubble.style.left = event.clientX + 'px';
            bubble.style.top = event.clientY + 'px';
            document.body.appendChild(bubble);
            setTimeout(() => bubble.remove(), 600);

        // --- OPEN / CLOSE PAGE LOGIC ---
        function openPage(pageName) {
            document.getElementById('modal-title').innerText = pageName.toUpperCase();
            const content = pageTemplates[pageName] || '<h2 style="color:red; text-align:center;">Not Found</h2>';
            document.getElementById('modal-content').innerHTML = content;

            document.getElementById('ui-layer').style.filter = 'blur(5px)';
            document.getElementById('character-canvas').style.filter = 'blur(5px)';
            
            const overlay = document.getElementById('modal-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.style.opacity = '1';
                overlay.classList.add('active');
            }, 10);
        }

        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            overlay.style.opacity = '0';
            overlay.classList.remove('active');
            
            document.getElementById('ui-layer').style.filter = 'none';
            document.getElementById('character-canvas').style.filter = 'none';

            setTimeout(() => { overlay.style.display = 'none'; }, 300);
        }
    </script>
